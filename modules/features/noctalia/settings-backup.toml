[backdrop]
blur_intensity = 0.14999999664723873
tint_intensity = 0.13999999687075615

[bar]
order = [ "default", "left" ]

    [bar.default]
    border = "primary"
    center = [ "clock", "weather" ]
    contact_shadow = true
    end = [ "tray", "network", "bluetooth", "volume", "keyboard_layout", "clipboard", "control-center" ]
    font_weight = 300
    margin_edge = 3
    margin_ends = 300
    radius = 0
    start = [ "battery", "workspaces", "active_window", "recorder", "caffeine" ]
    thickness = 33

    [bar.left]
    enabled = false
    margin_ends = 10
    position = "left"

[calendar]
enabled = true

[idle]
behavior_order = [ "lock", "screen-off", "lock-and-suspend" ]

    [idle.behavior.lock]
    action = "lock"
    enabled = true
    timeout = 600

    [idle.behavior.lock-and-suspend]
    action = "lock_and_suspend"
    enabled = true
    timeout = 900

    [idle.behavior.screen-off]
    action = "screen_off"
    enabled = true
    timeout = 660

[location]
address = "Canberra, Australia"

